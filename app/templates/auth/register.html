{% extends "base.html" %}
{% block title %}Crear usuario — Repositorio{% endblock %}

{% block content %}
  <div class="card card--big auth-card">
    <div class="auth-head">
      <h1 class="h1 center">Crear usuario</h1>
      <p class="muted center">Registro interno (Municipalidad de Cunco)</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register_post') }}" class="form">
      <div class="form__row">
        <label class="label" for="username">Usuario (sin @)</label>
        <input class="input" id="username" name="username" placeholder="ej: mmontoya" required />
        <div class="muted small">3–32 caracteres: letras/números/punto/guión/guión bajo.</div>
      </div>

      <div class="form__row">
        <label class="label" for="full_name">Nombre completo</label>
        <input class="input" id="full_name" name="full_name" placeholder="ej: Marcelo Montoya Mellado" required />
      </div>

      <div class="form__row">
        <label class="label" for="email">Correo</label>
        <input class="input" id="email" type="email" name="email" placeholder="ej: nombre@municunco.cl" required />
      </div>

      <div class="form__row">
        <label class="label" for="password">Contraseña</label>
        <input class="input" id="password" type="password" name="password" required />
      </div>

      <div class="form__row">
        <label class="label" for="password2">Repetir contraseña</label>
        <input class="input" id="password2" type="password" name="password2" required />
      </div>

      <button class="btn" type="submit">Crear</button>

      <div class="muted small" style="margin-top:10px;">
        ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}" style="text-decoration:underline;">Volver al login</a>
      </div>
    </form>
  </div>
{% endblock %}
