{% extends "base.html" %}
{% block title %}Login — Repositorio{% endblock %}

{% block content %}
  <div class="auth-shell">
    <div class="auth-panel">
      <div class="auth-panel__icon" aria-hidden="true">🔐</div>

      <h1 class="auth-panel__title">Iniciar sesión</h1>
      <p class="auth-panel__sub">Acceso al Repositorio Intranet Municunco</p>

      <form method="POST" action="{{ url_for('auth.login_post') }}" class="form">
        <div class="form__row">
          <label class="label" for="username">Usuario</label>
          <input
            class="input"
            id="username"
            type="text"
            name="username"
            placeholder="ej: admin"
            autocomplete="username"
            required
          />
          <div class="help">El usuario no lleva @.</div>
        </div>

        <div class="form__row">
          <label class="label" for="password">Contraseña</label>
          <input
            class="input"
            id="password"
            type="password"
            name="password"
            autocomplete="current-password"
            required
          />
        </div>

        <button class="btn auth-btn" type="submit">Entrar</button>

        <p class="muted small center" style="margin-top: 10px;">
          Si necesitas cuenta, solicítala a un administrador.
        </p>
      </form>
    </div>
  </div>
{% endblock %}
