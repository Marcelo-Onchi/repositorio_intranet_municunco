{% extends "base.html" %}
{% block title %}Login — Repositorio{% endblock %}

{% block content %}
  <div class="card card--big auth-card">
    <div class="auth-head">
      <h1 class="h1 center">Iniciar sesión</h1>
      <p class="muted center">Acceso al Repositorio Intranet Municunco</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login_post') }}" class="form">
      <div class="form__row">
        <label class="label" for="email">Email</label>
        <input class="input" id="email" type="email" name="email" value="admin@municunco.cl" autocomplete="username" required />
      </div>

      <div class="form__row">
        <label class="label" for="password">Contraseña</label>
        <input class="input" id="password" type="password" name="password" autocomplete="current-password" required />
      </div>

      <button class="btn" type="submit">Entrar</button>
      <p class="muted small">Admin inicial desde .env (ADMIN_EMAIL / ADMIN_PASSWORD).</p>
    </form>
  </div>
{% endblock %}
