{% extends "base.html" %}
{% block title %}Categorías{% endblock %}

{% block content %}
  <div class="card card--big">
    <h1 class="h1">Categorías</h1>

    <form method="POST" action="{{ url_for('admin.categories_create') }}" class="form form--row">
      <input class="input" name="name" placeholder="Nueva categoría (Ej: RRHH, Finanzas...)" required />
      <button class="btn" type="submit">Crear</button>
    </form>

    <div class="chips">
      {% for c in cats %}
        <div class="chip">{{ c.name }}</div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
